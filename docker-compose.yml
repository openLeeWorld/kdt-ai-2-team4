#version: '3.8'

services:
  fastapi:
    image: ${NCP_REGISTRY}/smishing-backend:latest
    container_name: smishing-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/web_mvp/dist:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt # SSL 인증서 공유
    depends_on:
      - fastapi
