# Deploy wrapper compose example.
# Run from the deploy directory:
# docker compose -f docker-compose.example.yml up --build

services:
  deploy_wrapper:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      # Relative to this compose file. Do not put real secrets in .env.example.
      - .env.example
    # The wrapper app lives under deploy/app.
    command: ["uvicorn", "deploy.app.main:app", "--host", "0.0.0.0", "--port", "8001"]
